<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mi experiencia escolar</title>

<style>

/* GENERAL */
*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Arial, sans-serif;
background:linear-gradient(to bottom,#e6f0ff,#f0e6ff);
color:#333;
}

/* TITULO PRINCIPAL */
.titulo{
background:#6c63ff;
text-align:center;
padding:15px;
color:white;
}

.titulo h1{
font-size:24px;
margin-bottom:5px;
}

/* LOGO */
.logo{
width:60px;
display:block;
margin:10px auto 0 auto;
}

/* BUSCADOR */
.buscador{
text-align:center;
padding:15px;
background:#a0c4ff;
}

.buscador input{
width:70%;
max-width:300px;
padding:10px;
border:none;
border-radius:10px 0 0 10px;
outline:none;
}

.buscador button{
padding:10px;
border:none;
background:#4b47c5;
color:white;
border-radius:0 10px 10px 0;
cursor:pointer;
}

/* MENU */
nav{
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

nav ul{
list-style:none;
display:flex;
justify-content:center;
flex-wrap:wrap;
}

nav ul li a{
display:block;
padding:15px;
text-decoration:none;
color:#4a3f55;
font-weight:bold;
}

nav ul li a:hover{
background:#f0e6ff;
}

/* PORTADA */
.portada{
position:relative;
width:100%;
height:70vh;
overflow:hidden;
}

.portada img{
width:100%;
height:100%;
object-fit:cover;
}

/* TEXTO SOBRE IMAGEN */
.texto{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.4);
padding:20px;
border-radius:15px;
color:white;
text-align:center;
}

.texto h1{
font-size:24px;
}

/* RESPONSIVE */
@media (max-width:768px){

.portada{
height:55vh;
}

.texto h1{
font-size:20px;
}

nav ul{
flex-direction:column;
align-items:center;
}

}

@media (max-width:480px){

.titulo h1{
font-size:18px;
}

.portada{
height:45vh;
}

.texto h1{
font-size:18px;
}

.buscador input{
width:60%;
}

.logo{
width:50px;
}

}

</style>

<script>
function buscar(){
let texto = document.getElementById("busqueda").value.toLowerCase();

if(texto.includes("abandono")){
window.location.href="menu1.html";
}
else if(texto.includes("consecuencias")){
window.location.href="menu2.html";
}
else if(texto.includes("permanencia")){
window.location.href="menu3.html";
}
else if(texto.includes("prevencion")){
window.location.href="menu4.html";
}
else if(texto.includes("familia")){
window.location.href="menu5.html";
}
else if(texto.includes("recursos")){
window.location.href="menu6.html";
}
else{
alert("No se encontró la información");
}
}
</script>

</head>

<body>

<!-- TITULO + LOGO -->
<div class="titulo">
<h1>MI EXPERIENCIA ESCOLAR PUEDE MEJORAR LA TUYA</h1>
<img src="logo.jpeg" class="logo">
</div>

<!-- BUSCADOR -->
<div class="buscador">
<input type="text" id="busqueda" placeholder="Buscar...">
<button onclick="buscar()">Buscar</button>
</div>

<!-- MENU -->
<nav>
<ul>
<li><a href="menu1.html">Abandono</a></li>
<li><a href="menu2.html">Consecuencias</a></li>
<li><a href="menu3.html">Permanencia</a></li>
<li><a href="menu4.html">Prevención</a></li>
<li><a href="menu5.html">Familia</a></li>
<li><a href="menu6.html">Recursos</a></li>
</ul>
</nav>

<!-- PORTADA -->
<div class="portada">

<img src="princi.jpeg" alt="imagen principal">


</div>

</body>
</html>
